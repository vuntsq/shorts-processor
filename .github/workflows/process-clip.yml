# ============================================================
# .github/workflows/process-clip.yml
# YouTube Shorts Processing Pipeline
# ============================================================
# Triggered manually from GitHub Mobile or the browser.
# You supply the filename of a Release asset (your raw game clip).
# The workflow downloads it from the "clips" release, runs FFmpeg,
# and uploads the processed video + SEO text as downloadable artifacts.
# ============================================================

name: Process Gaming Clip

on:
  workflow_dispatch:
    inputs:
      clip_name:
        description: "Comma-separated clip names without extension (e.g. cod_crazy_1v3_clutch, apex_solo_win)"
        required: true
        type: string

jobs:
  process:
    name: Encode & Generate SEO
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Check out the repo (gets index.js, config.json, scripts/) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Install FFmpeg ─────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── 4. Create input directory & download clips ────────────────────
      - name: Download clips from Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./input
          RESOLVED_NAMES=""

          IFS=',' read -ra CLIPS <<< "${{ github.event.inputs.clip_name }}"
          for RAW in "${CLIPS[@]}"; do
            CLIP_NAME="$(echo "${RAW}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            # Skip empty entries (e.g. from trailing commas)
            [ -z "$CLIP_NAME" ] && continue

            # Default to .mov if no extension provided — iOS always records .mov
            if [[ "$CLIP_NAME" != *.* ]]; then
              CLIP_NAME="${CLIP_NAME}.mov"
              echo "   No extension given, defaulting to .mov → ${CLIP_NAME}"
            fi

            echo "⬇️  Downloading: $CLIP_NAME"

            # gh release download handles private repo auth correctly.
            # It fetches the asset by filename from the "clips" release tag
            # without forwarding auth headers to the S3 CDN (which causes 404s with curl).
            gh release download clips \
              --repo ${{ github.repository }} \
              --pattern "${CLIP_NAME}" \
              --dir ./input

            # Confirm the download succeeded and show file size
            ls -lh "./input/${CLIP_NAME}"

            if [ -n "$RESOLVED_NAMES" ]; then
              RESOLVED_NAMES="${RESOLVED_NAMES},${CLIP_NAME}"
            else
              RESOLVED_NAMES="${CLIP_NAME}"
            fi
          done

          # Export the resolved names so subsequent steps use the correct filenames
          echo "RESOLVED_CLIP_NAMES=${RESOLVED_NAMES}" >> $GITHUB_ENV

      # ── 5. Make bash scripts executable ──────────────────────────────
      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      # ── 6. Run the Node.js pipeline ───────────────────────────────────
      - name: Run processing pipeline
        run: |
          IFS=',' read -ra CLIPS <<< "$RESOLVED_CLIP_NAMES"
          for CLIP_NAME in "${CLIPS[@]}"; do
            echo "🎬  Processing: ${CLIP_NAME}"
            if [ ! -f "./input/${CLIP_NAME}" ]; then
              echo "❌  Input file not found: ./input/${CLIP_NAME}"
              exit 1
            fi
            INPUT_FILE="./input/${CLIP_NAME}" node index.js
          done

      # ── 7. List output files (useful for debugging) ───────────────────
      - name: Show output files
        run: |
          echo "── Output directory ──────────────────────────────────"
          find ./output -type f | xargs ls -lh
          echo "── SEO preview ───────────────────────────────────────"
          find ./output -name "seo.txt" -exec cat {} \;

      # ── 8. Upload processed video and SEO text as a single artifact ──────
      - name: Upload processed video
        uses: actions/upload-artifact@v4
        with:
          name: processed-video
          path: ./output/
          retention-days: 7
