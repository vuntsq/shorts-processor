# ============================================================
# .github/workflows/process-clip.yml
# YouTube Shorts Processing Pipeline
# ============================================================
# Triggered manually from GitHub Mobile or the browser.
# You supply the filename of a Release asset (your raw game clip).
# The workflow downloads it from the "clips" release, runs FFmpeg,
# and uploads the processed video + SEO text as downloadable artifacts.
# ============================================================

name: Process Gaming Clip

on:
  workflow_dispatch:
    inputs:
      clip_name:
        description: "Clip name without extension (e.g. cod_crazy_1v3_clutch)"
        required: true
        type: string

jobs:
  process:
    name: Encode & Generate SEO
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Check out the repo (gets index.js, config.json, scripts/) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Install FFmpeg ─────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── 4. Create input directory & download clip ─────────────────────
      - name: Download clip from Release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./input
          CLIP_NAME="${{ github.event.inputs.clip_name }}"

          # Default to .mov if no extension provided — iOS always records .mov
          if [[ "$CLIP_NAME" != *.* ]]; then
            CLIP_NAME="${CLIP_NAME}.mov"
            echo "   No extension given, defaulting to .mov"
          fi

          echo "⬇️  Downloading: $CLIP_NAME"

          # gh release download handles private repo auth correctly.
          # It fetches the asset by filename from the "clips" release tag
          # without forwarding auth headers to the S3 CDN (which causes 404s with curl).
          gh release download clips \
            --repo ${{ github.repository }} \
            --pattern "${CLIP_NAME}" \
            --dir ./input

          # Confirm the download succeeded and show file size
          ls -lh "./input/${CLIP_NAME}"

          # Export the resolved name so subsequent steps use the correct filename
          echo "CLIP_NAME=${CLIP_NAME}" >> $GITHUB_ENV

      # ── 5. Make bash scripts executable ──────────────────────────────
      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      # ── 6. Run the Node.js pipeline ───────────────────────────────────
      - name: Run processing pipeline
        env:
          INPUT_FILE: "./input/${{ env.CLIP_NAME }}"
        run: node index.js

      # ── 7. List output files (useful for debugging) ───────────────────
      - name: Show output files
        run: |
          echo "── Output directory ──────────────────────────────────"
          find ./output -type f | xargs ls -lh
          echo "── SEO preview ───────────────────────────────────────"
          find ./output -name "seo.txt" -exec cat {} \;

      # ── 8. Upload processed video and SEO text as a single artifact ──────
      - name: Upload processed video
        uses: actions/upload-artifact@v4
        with:
          name: processed-video
          path: ./output/
          retention-days: 7
